<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Теннисный Клуб</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        h2 { text-align: center; margin-bottom: 10px;}
        h3 { margin-bottom: 5px; }
        p.subtitle { text-align: center; color: var(--tg-theme-hint-color); margin-bottom: 25px; font-size: 14px; }

        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 12px; background-color: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #ffffff); border: none; border-radius: 10px; font-size: 16px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
        .btn:disabled { opacity: 0.5; cursor: default; }
        .btn-outline { background-color: transparent; color: var(--tg-theme-button-color, #3390ec); border: 2px solid var(--tg-theme-button-color, #3390ec); }
        .btn-back { background-color: var(--tg-theme-secondary-bg-color, #f0f0f0); color: var(--tg-theme-text-color, #000); margin-top: 20px; }
        .btn-danger { background-color: transparent; color: #e64646; border: 2px solid #e64646; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; color: var(--tg-theme-hint-color); }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--tg-theme-hint-color, #ccc); border-radius: 8px; background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); box-sizing: border-box; font-size: 15px; }

        .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .time-slot { padding: 10px; text-align: center; border: 1px solid var(--tg-theme-button-color, #3390ec); border-radius: 8px; color: var(--tg-theme-text-color, #000); cursor: pointer; font-size: 14px; }
        .time-slot.selected { background-color: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #ffffff); }
        .time-slot.occupied { border-color: #e64646; color: #e64646; background-color: rgba(230, 70, 70, 0.05); cursor: not-allowed; }
        .time-slot.admin-block { border-color: #ff9800; color: #ff9800; background-color: rgba(255, 152, 0, 0.1); }
        .time-slot.past { border-color: var(--tg-theme-hint-color, #ccc); color: var(--tg-theme-hint-color, #999); background-color: transparent; cursor: not-allowed; opacity: 0.6; }
        .time-slot span { display: block; font-size: 11px; opacity: 0.8; }

        .hidden { display: none !important; }
        .admin-badge { background: #ff9800; color: #fff; padding: 5px 10px; border-radius: 5px; font-size: 12px; display: inline-block; margin-bottom: 15px;}
        .user-chip { text-align: center; font-size: 13px; color: var(--tg-theme-hint-color); margin-bottom: 18px; }

        #loader { text-align: center; color: var(--tg-theme-hint-color); font-weight: bold; margin-top: 20px; }

        /* Экран успеха */
        #result-screen { text-align: center; }
        .result-icon { font-size: 56px; margin: 20px 0 10px; }
        .result-card { background: var(--tg-theme-secondary-bg-color, #f5f5f5); border-radius: 12px; padding: 16px; margin: 16px 0; text-align: left; font-size: 15px; line-height: 1.6; }
        .result-card b { color: var(--tg-theme-text-color, #000); }

        /* Мои записи */
        .booking-item { background: var(--tg-theme-secondary-bg-color, #f5f5f5); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .booking-item .info { font-size: 14px; line-height: 1.4; }
        .booking-item .info small { color: var(--tg-theme-hint-color); }
        .empty-note { text-align: center; color: var(--tg-theme-hint-color); margin: 30px 0; }
    </style>
</head>
<body>

<div class="container">

    <!-- АВТОРИЗАЦИЯ -->
    <div id="auth-screen">
        <h2>Теннисный клуб 🎾</h2>
        <p class="subtitle" id="auth-subtitle">Загружаем профиль…</p>

        <!-- Поле телефона нужно только в браузере (для теста) или если хотим собрать номер -->
        <div class="form-group hidden" id="phone-group">
            <label>Телефон для связи</label>
            <input type="tel" id="user-phone" placeholder="+7 ...">
        </div>

        <button class="btn" id="login-btn" onclick="login()">Войти</button>
        <div id="loader" class="hidden">🔄 Загрузка расписания...</div>
    </div>

    <!-- МЕНЮ -->
    <div id="main-screen" class="hidden">
        <h2>Главное меню</h2>
        <div class="user-chip" id="user-chip"></div>
        <button class="btn" onclick="showScreen('court-booking-screen')">📅 Аренда корта</button>
        <button class="btn" onclick="showScreen('coach-screen')">💪 С тренером</button>
        <button class="btn btn-outline" onclick="openMyBookings()">📋 Мои записи</button>
        <button class="btn btn-outline hidden" id="admin-btn" onclick="showScreen('admin-screen')">⚙️ Панель Администратора</button>
    </div>

    <!-- АРЕНДА КОРТА -->
    <div id="court-booking-screen" class="hidden">
        <h2>Аренда корта</h2>
        <div class="form-group">
            <label>Выберите корт:</label>
            <select id="court-select" onchange="generateSlots('court')">
                <option value="Корт 1">Корт 1 (Грунт)</option>
                <option value="Корт 2">Корт 2 (Хард)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Выберите дату:</label>
            <input type="date" id="court-date" onchange="generateSlots('court')">
        </div>
        <div class="form-group hidden" id="court-slots-container">
            <label>Доступное время:</label>
            <div class="time-grid" id="court-time-grid"></div>
        </div>
        <button class="btn" id="court-submit" onclick="submitData('court')">Забронировать</button>
        <button class="btn btn-back" onclick="showScreen('main-screen')">Назад</button>
    </div>

    <!-- ЗАПИСЬ К ТРЕНЕРУ -->
    <div id="coach-screen" class="hidden">
        <h2>Запись к тренеру</h2>
        <div class="form-group">
            <label>Выберите тренера:</label>
            <select id="coach-select" onchange="generateSlots('coach')">
                <option value="Галина">Галина (на Корте 1)</option>
                <option value="Наталья">Наталья (на Корте 2)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Выберите дату:</label>
            <input type="date" id="coach-date" onchange="generateSlots('coach')">
        </div>
        <div class="form-group hidden" id="coach-slots-container">
            <label>Доступное время:</label>
            <div class="time-grid" id="coach-time-grid"></div>
        </div>
        <button class="btn" id="coach-submit" onclick="submitData('coach')">Записаться</button>
        <button class="btn btn-back" onclick="showScreen('main-screen')">Назад</button>
    </div>

    <!-- МОИ ЗАПИСИ -->
    <div id="my-screen" class="hidden">
        <h2>Мои записи</h2>
        <p class="subtitle">Здесь видны все ваши предстоящие брони.</p>
        <div id="my-list"></div>
        <button class="btn btn-back" onclick="showScreen('main-screen')">Назад</button>
    </div>

    <!-- ЭКРАН УСПЕХА -->
    <div id="result-screen" class="hidden">
        <div class="result-icon">✅</div>
        <h2>Готово!</h2>
        <div class="result-card" id="result-text"></div>
        <button class="btn" onclick="showScreen('main-screen')">В главное меню</button>
    </div>

    <!-- ПАНЕЛЬ АДМИНА -->
    <div id="admin-screen" class="hidden">
        <div class="admin-badge">Режим управления расписанием</div>
        <h2>Блокировка слотов</h2>
        <p class="subtitle">Нажмите на свободный слот, чтобы закрыть его.</p>

        <div class="form-group">
            <label>Кого/Что редактируем?</label>
            <select id="admin-target" onchange="generateAdminSlots()">
                <option value="Корт 1">Корт 1</option>
                <option value="Корт 2">Корт 2</option>
                <option value="Галина">Тренер: Галина</option>
                <option value="Наталья">Тренер: Наталья</option>
            </select>
        </div>
        <div class="form-group">
            <label>Дата:</label>
            <input type="date" id="admin-date" onchange="generateAdminSlots()">
        </div>
        <div class="time-grid" id="admin-time-grid"></div>
        <button class="btn btn-back" onclick="showScreen('main-screen')">В главное меню</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // === НАСТРОЙКИ ===
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyiSZhoouByR9YpDA5uuFcr2MRiGnqqAcEFe7KM29NJ2y60IbIWEdmrqlHMZmOFOdM63A/exec';

    // Telegram ID администраторов. Узнать свой ID можно у бота @userinfobot
    const ADMIN_IDS = [132787250]; // сюда добавляй ID остальных админов через запятую

    // Нужно ли просить телефон. Если хватает имени из Telegram — поставь false.
    const COLLECT_PHONE = false;

    const baseTimeSlots = ["09:00", "10:30", "12:00", "13:30", "15:00", "16:30", "18:00", "19:30"];

    // === СОСТОЯНИЕ ===
    const tgUser = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user : null;
    let userId = tgUser ? String(tgUser.id) : "";
    let userName = tgUser ? [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ') : "";
    let userPhone = "";
    let isAdmin = false;
    let selectedTime = "";
    let globalBookings = [];

    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        ['court-date', 'coach-date', 'admin-date'].forEach(id => {
            document.getElementById(id).min = today;
        });

        const sub = document.getElementById('auth-subtitle');
        if (tgUser) {
            // Мы внутри Telegram — личность уже известна, телефон необязателен
            sub.innerText = `Здравствуйте, ${userName || 'игрок'}! Нажмите «Войти», чтобы продолжить.`;
            if (COLLECT_PHONE) {
                document.getElementById('phone-group').classList.remove('hidden');
                document.querySelector('#phone-group label').innerText = 'Телефон для связи (необязательно)';
            }
        } else {
            // Открыто в браузере для теста — Telegram-личности нет
            sub.innerHTML = 'Открыто вне Telegram (режим теста).<br>Введите телефон, чтобы продолжить. <small>(7777777777 — вход в админку)</small>';
            document.getElementById('phone-group').classList.remove('hidden');
        }
    };

    async function login() {
        userPhone = (document.getElementById('user-phone').value || "").trim();

        if (!tgUser) {
            // Браузерный режим: телефон обязателен и служит идентификатором
            if (userPhone.length < 5) return tg.showAlert("Введите корректный номер");
            userId = "guest_" + userPhone;
            userName = userName || ("Гость " + userPhone);
        }

        isAdmin = ADMIN_IDS.includes(Number(userId)) || userPhone === "7777777777";

        document.getElementById('login-btn').classList.add('hidden');
        document.getElementById('loader').classList.remove('hidden');

        try {
            const response = await fetch(SCRIPT_URL);
            globalBookings = await response.json();
            if (!Array.isArray(globalBookings)) globalBookings = [];
        } catch (error) {
            globalBookings = [];
            tg.showAlert("Не удалось загрузить расписание. Проверьте соединение и попробуйте ещё раз.");
        }

        document.getElementById('loader').classList.add('hidden');
        document.getElementById('login-btn').classList.remove('hidden');

        document.getElementById('user-chip').innerText =
            (userName ? userName : "Гость") + (userPhone ? " · " + userPhone : "");
        if (isAdmin) document.getElementById('admin-btn').classList.remove('hidden');

        showScreen('main-screen');
    }

    function showScreen(screenId) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
    }

    // Связка тренеров и кортов: тренер занимает свой корт, и наоборот
    function linkedTargets(target) {
        const map = {
            'Корт 1': ['Корт 1', 'Галина'],
            'Галина': ['Галина', 'Корт 1'],
            'Корт 2': ['Корт 2', 'Наталья'],
            'Наталья': ['Наталья', 'Корт 2']
        };
        return map[target] || [target];
    }

    function getOccupyingBooking(bookings, date, time, target) {
        const conflicts = linkedTargets(target);
        return bookings.find(b =>
            b.date === date && b.time === time && conflicts.indexOf(b.target) !== -1
        );
    }

    // Проверка, что слот уже в прошлом (для сегодняшней даты)
    function isPastSlot(date, time) {
        const today = new Date().toISOString().split('T')[0];
        if (date !== today) return false;
        const now = new Date();
        const [h, m] = time.split(':').map(Number);
        const slotDate = new Date();
        slotDate.setHours(h, m, 0, 0);
        return slotDate <= now;
    }

    function generateSlots(type) {
        const dateId = type === 'court' ? 'court-date' : 'coach-date';
        const targetId = type === 'court' ? 'court-select' : 'coach-select';
        const containerId = type === 'court' ? 'court-slots-container' : 'coach-slots-container';
        const gridId = type === 'court' ? 'court-time-grid' : 'coach-time-grid';

        const date = document.getElementById(dateId).value;
        const target = document.getElementById(targetId).value;

        if (!date) return document.getElementById(containerId).classList.add('hidden');

        document.getElementById(containerId).classList.remove('hidden');
        const grid = document.getElementById(gridId);
        grid.innerHTML = '';
        selectedTime = "";

        baseTimeSlots.forEach(time => {
            const btn = document.createElement('div');
            const slotData = getOccupyingBooking(globalBookings, date, time, target);

            if (isPastSlot(date, time)) {
                btn.className = 'time-slot past';
                btn.innerHTML = `${time} <span>Прошло</span>`;
            } else if (slotData) {
                let reason = slotData.isUser ? 'Занято' : 'Не работает';
                if (slotData.target !== target) reason = `Занято (${slotData.target})`;
                btn.className = 'time-slot ' + (slotData.isUser ? 'occupied' : 'admin-block');
                btn.innerHTML = `${time} <span>${reason}</span>`;
            } else {
                btn.className = 'time-slot';
                btn.innerHTML = `${time} <span>Выбрать</span>`;
                btn.onclick = () => {
                    document.querySelectorAll(`#${gridId} .time-slot`).forEach(el => el.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedTime = time;
                };
            }
            grid.appendChild(btn);
        });
    }

    function generateAdminSlots() {
        const date = document.getElementById('admin-date').value;
        const target = document.getElementById('admin-target').value;
        const grid = document.getElementById('admin-time-grid');
        grid.innerHTML = '';
        if (!date) return;

        baseTimeSlots.forEach(time => {
            const btn = document.createElement('div');
            const slotData = getOccupyingBooking(globalBookings, date, time, target);

            if (slotData) {
                btn.className = 'time-slot ' + (slotData.isUser ? 'occupied' : 'admin-block');
                const label = slotData.target !== target ? `Занято (${slotData.target})` : 'Занято';
                btn.innerHTML = `${time} <span>${label}</span>`;
                btn.onclick = () => tg.showAlert('Чтобы снять бронь или блокировку, удалите соответствующую строку в Google Таблице.');
            } else {
                btn.className = 'time-slot';
                btn.innerHTML = `${time} <span>Свободно (Закрыть)</span>`;
                btn.onclick = () => {
                    let blockData = { date, time, target: target, isUser: false, phone: "Админ", tgId: userId, name: userName };
                    globalBookings.push(blockData);
                    generateAdminSlots();
                    sendBooking(blockData).catch(e => console.log(e));
                };
            }
            grid.appendChild(btn);
        });
    }

    // Единая отправка данных в таблицу
    function sendBooking(data) {
        // text/plain — чтобы не было CORS-preflight, который Apps Script не обрабатывает
        return fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(data)
        });
    }

    async function submitData(type) {
        const dateId = type === 'court' ? 'court-date' : 'coach-date';
        const targetId = type === 'court' ? 'court-select' : 'coach-select';
        const btnId = type === 'court' ? 'court-submit' : 'coach-submit';

        const date = document.getElementById(dateId).value;
        const target = document.getElementById(targetId).value; // полное имя: "Корт 1" / "Галина" и т.д.

        if (!date || !selectedTime) return tg.showAlert("Выберите дату и время!");
        if (isPastSlot(date, selectedTime)) return tg.showAlert("Это время уже прошло, выберите другое.");

        const btn = document.getElementById(btnId);
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = "Проверяем…";

        const bookingData = {
            date,
            time: selectedTime,
            target,
            isUser: true,
            phone: userPhone,
            tgId: userId,
            name: userName
        };

        try {
            // Обновляем расписание, чтобы поймать брони, сделанные другими прямо сейчас
            try {
                const fresh = await (await fetch(SCRIPT_URL)).json();
                if (Array.isArray(fresh)) globalBookings = fresh;
            } catch (_) {}

            if (getOccupyingBooking(globalBookings, date, selectedTime, target)) {
                tg.showAlert("Увы, это время только что заняли. Выберите другое.");
                generateSlots(type);
                return;
            }

            btn.innerText = "Отправляем…";
            const res = await sendBooking(bookingData);

            // Сервер может вернуть {ok:false} если слот заняли в последний момент
            let ok = true;
            try {
                const json = await res.json();
                if (json && json.ok === false) ok = false;
            } catch (_) { /* ответ нечитаем из-за CORS — считаем успехом */ }

            if (!ok) {
                tg.showAlert("Это время только что заняли. Выберите другое.");
                try { globalBookings = await (await fetch(SCRIPT_URL)).json(); } catch (_) {}
                generateSlots(type);
                return;
            }

            globalBookings.push(bookingData);
            document.getElementById('result-text').innerHTML =
                `<b>${target}</b><br>📅 ${formatDate(date)}<br>🕐 ${selectedTime}` +
                (userName ? `<br>👤 ${userName}` : '');
            showScreen('result-screen');
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            selectedTime = "";
        } catch (e) {
            tg.showAlert("Не удалось сохранить запись. Проверьте интернет и попробуйте снова.");
        } finally {
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }

    function formatDate(d) {
        const [y, m, day] = d.split('-');
        return `${day}.${m}.${y}`;
    }

    // === МОИ ЗАПИСИ ===
    function openMyBookings() {
        const list = document.getElementById('my-list');
        const today = new Date().toISOString().split('T')[0];

        const mine = globalBookings.filter(b =>
            b.isUser &&
            ((b.tgId && String(b.tgId) === userId) || (userPhone && b.phone === userPhone)) &&
            b.date >= today
        ).sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

        if (mine.length === 0) {
            list.innerHTML = '<div class="empty-note">Пока нет предстоящих записей.</div>';
        } else {
            list.innerHTML = mine.map(b => `
                <div class="booking-item">
                    <div class="info"><b>${b.target}</b><br><small>${formatDate(b.date)} · ${b.time}</small></div>
                </div>`).join('');
        }
        showScreen('my-screen');
    }
</script>
</body>
</html>
